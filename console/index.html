layout: none
---
<!DOCTYPE html>
<!--
07/07/2020
Main console page
-->
<html lang="en">
<head>
  {% include head.html %}
  <title>Console - cEDH Decklist Database</title>

  <link rel="stylesheet" type="text/css" media="screen" href="/console/styles/console.css" />
</head>

<body>
  {% include loading.html %}
  <div id="wrapper">
    {% include console-navbar.html %}

    <div id="content" class="">
      <aside>
        <div id="req-description">
          {% capture content %}
          {%- include markdown/admin/requests.md -%}
          {% endcapture %}
          {{ content | escape | markdownify | replace: "id=", "data-content-id=" }}
        </div>
        <div id="req-controls" class="ns">
          <input id="show-deleted" type="checkbox" autocomplete="off"></input>
          <label for="show-deleted">Show deleted requests</label>
        </div>
        <ul id="requests">
        </ul>
      </aside>
      <section>
        <textarea id="db-json" readonly style="width: 100%; height: 80vh; box-sizing: border-box;"></textarea>
      </section>
    </div>

    <ul class="hidden">
      <li class="flex-column" id="req-template">
        <div class="flex req-wrap">
          <div class="req-category"></div>
          <button class="req-delete ns">X</button>
        </div>
        <div class="req-description"></div>
        <div class="flex">
          <div class="req-username"></div>
          <div class="req-date"></div>
        </div>
      </li>
    </ul>

  </div>

  <script src="/console/scripts/account.js"></script>
  <script src="/console/scripts/console.js"></script>
</body>
</html>
